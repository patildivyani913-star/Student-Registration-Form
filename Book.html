<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library Manager</title>
</head>
<body>

    <h1>📚 Book Library Manager</h1>

    <input type="text" id="bookInput" placeholder="Enter Book Name">

    <br><br>

    <button id="addBtn">Add Book</button>
    <button id="removeBtn">Remove Last Book</button>
    <button id="searchBtn">Search Book</button>
    <button id="showBtn">Show All Books</button>
    <button id="countBtn">Total Books</button>

    <hr>

    <h3>Output</h3>
    <div id="output"></div>

    <script src="BookLibrary.js"></script>

</body>
</html>
