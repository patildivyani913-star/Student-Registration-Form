<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h1 align="center">Student Registration Form</h1>

    <form>

        <label>Roll No. :</label>
        <input type="text" size="50"><br><br>

        <label>Student Name :</label>
        <input type="text" placeholder="First Name">
        -
        <input type="text" placeholder="Last Name"><br><br>

        <label>Father's Name :</label>
        <input type="text" size="50"><br><br>

        <label>Date of Birth :</label>
        <input type="text" placeholder="Day" size="5">
        -
        <input type="text" placeholder="Month" size="5">
        -
        <input type="text" placeholder="Year" size="8">
        (DD-MM-YYYY)
        <br><br>

        <label>Mobile No. :</label>
        <input type="text" value="+91" size="3">
        -
        <input type="text" size="40"><br><br>

        <label>Email ID :</label>
        <input type="email" size="50"><br><br>

        <label>Password :</label>
        <input type="password" size="50"><br><br>

        <label>Gender :</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Department :</label>
        <input type="checkbox"> CSE
        <input type="checkbox"> IT
        <input type="checkbox"> ECE
        <input type="checkbox"> Civil
        <input type="checkbox"> Mech
        <br><br>

        <label>Course :</label>
        <select>
            <option>---------------- Select Current Course ----------------</option>
            <option>BCA</option>
            <option>B.Sc</option>
            <option>B.Tech</option>
            <option>MCA</option>
            <option>M.Tech</option>
        </select>
        <br><br>

        <label>Student Photo :</label>
        <input type="file"><br><br>

        <label>City :</label>
        <input type="text" size="50"><br><br>

        <label>Address :</label><br>
        <textarea rows="6" cols="50"></textarea>
        <br><br>

        <center>
            <input type="submit" value="Register">
        </center>

    </form>

</body>
</html>
